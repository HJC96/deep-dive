name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Testcontainers는 Docker가 필요하다. GitHub-hosted ubuntu 러너에는 Docker가 기본 설치돼 있다.
      - name: Run all module tests
        run: ./gradlew test --no-daemon
