spring:
  output:
    ansi:
      enabled: always
  application:
    name: spring-cache-redis
  datasource:
    url: jdbc:mysql://localhost:3306/deepdive_cache_redis?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "deep-dive:spring-cache-redis::"
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.springframework.cache: debug
