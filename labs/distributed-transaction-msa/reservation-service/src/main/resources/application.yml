server:
  port: 8080

spring:
  application:
    name: reservation-service
  datasource:
    url: ${RESERVATION_DB_URL:jdbc:mysql://localhost:3306/reservation_db}
    username: ${RESERVATION_DB_USERNAME:root}
    password: ${RESERVATION_DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

services:
  seat:
    base-url: ${SEAT_SERVICE_URL:http://localhost:8081}
  wallet:
    base-url: ${WALLET_SERVICE_URL:http://localhost:8082}
