spring:
  output:
    ansi:
      enabled: always
  application:
    name: spring-boot-actuator

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - features
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    env:
      enabled: true
    git:
      mode: simple
  metrics:
    tags:
      application: actuator-lab
      environment: local
      region: kr

info:
  app:
    name: spring-boot-actuator
    version: 0.1.0-SNAPSHOT
    description: Spring Boot Actuator learning lab
  team: backend-lab
